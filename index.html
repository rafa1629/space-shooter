<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Shooter</title>
<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
}
canvas{
    display:block;
    background:radial-gradient(circle at center,#111,#000);
}
#ui{
    position:absolute;
    left:15px;
    top:10px;
    color:white;
    font-size:24px;
    user-select:none;
}
#message{
    position:absolute;
    width:100%;
    top:40%;
    text-align:center;
    color:white;
    font-size:48px;
    display:none;
}
#message small{
    display:block;
    margin-top:20px;
    font-size:24px;
}
</style>
</head>
<body>

<div id="ui">Score: 0</div>

<div id="message">
GAME OVER
<small>Press SPACE to Restart</small>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

const ui=document.getElementById("ui");
const msg=document.getElementById("message");

let player;
let bullets;
let enemies;
let boss;
let nextBossScore;
let keys={};
let score;
let scoreTimer;
let enemyTimer;
let gameOver;

function restart(){

    player={
        x:canvas.width/2,
        y:canvas.height-60,
        w:40,
        h:35,
        speed:10,
        cooldown:0
    };

    bullets=[];
    enemies=[];
    boss=null;
    nextBossScore=1000;

    score=0;
    scoreTimer=0;
    enemyTimer=0;
    gameOver=false;

    msg.style.display="none";
}

restart();

document.addEventListener("keydown",e=>{
    keys[e.code]=true;

    if(gameOver && e.code==="Space"){
        restart();
    }
});

document.addEventListener("keyup",e=>{
    keys[e.code]=false;
});

function spawnEnemy(){

    const size = 200 + Math.random() * 60;

    enemies.push({
        x:Math.random()*(canvas.width-size),
        y:-size,
        w:size,
        h:size,
        speed:0.5+Math.random()*1+score/1400,
        color:`hsl(${Math.random()*360},80%,60%)`
    });
}

function spawnBoss(){

    boss={
        x:canvas.width/2-140,
        y:40,
        w:280,
        h:90,
        hp:250,
        maxHp:250,
        speed:2,
        dir:1
    };

    nextBossScore+=1000;
}

function shoot(){

    bullets.push({
        x:player.x,
        y:player.y-25,
        w:6,
        h:30,
        speed:14
    });
}

function update(){

    if(gameOver)return;

    scoreTimer++;
    if(scoreTimer>=3){
        score++;
        scoreTimer=0;
    }

    ui.textContent="Score: "+score;

    if(keys.ArrowLeft||keys.KeyA)
        player.x-=player.speed;

    if(keys.ArrowRight||keys.KeyD)
        player.x+=player.speed;

    player.x=Math.max(player.w/2,
        Math.min(canvas.width-player.w/2,player.x));

    if(player.cooldown>0)player.cooldown--;

    if(keys.Space && player.cooldown===0){
        shoot();
        player.cooldown=8;
    }

    if(!boss){

        enemyTimer++;

        let spawnRate=Math.max(15,50-score/80);

        if(enemyTimer>=spawnRate){
            spawnEnemy();
            enemyTimer=0;
        }

        if(score>=nextBossScore){
            enemies=[];
            spawnBoss();
        }
    }

    for(let i=bullets.length-1;i>=0;i--){

        bullets[i].y-=bullets[i].speed;

        if(bullets[i].y<-40)
            bullets.splice(i,1);
    }

    if(boss){

        boss.x+=boss.speed*boss.dir;

        if(boss.x<20 || boss.x+boss.w>canvas.width-20)
            boss.dir*=-1;

        for(let i=bullets.length-1;i>=0;i--){

            let b=bullets[i];

            if(
                b.x>boss.x &&
                b.x<boss.x+boss.w &&
                b.y-b.h<boss.y+boss.h &&
                b.y>boss.y
            ){

                bullets.splice(i,1);
                boss.hp--;

                if(boss.hp<=0){
                    boss=null;
                    score+=500;
                    break;
                }
            }
        }
    }

    for(let i=enemies.length-1;i>=0;i--){

        let e=enemies[i];

        e.y+=e.speed;

        if(e.y>canvas.height){
            gameOver=true;
            msg.style.display="block";
        }

        for(let j=bullets.length-1;j>=0;j--){

            let b=bullets[j];

            if(
                b.x>e.x &&
                b.x<e.x+e.w &&
                b.y-b.h<e.y+e.h &&
                b.y>e.y
            ){
                enemies.splice(i,1);
                bullets.splice(j,1);
                break;
            }
        }
    }
}

function drawStars(){

    for(let i=0;i<120;i++){

        let x=(i*1237)%canvas.width;
        let y=(i*761+performance.now()*0.03)%canvas.height;

        ctx.fillStyle="rgba(255,255,255,.5)";
        ctx.fillRect(x,y,2,2);
    }
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawStars();

    // PLAYER
    ctx.save();
    ctx.translate(player.x,player.y);

    ctx.fillStyle="#4FC3FF";

    ctx.beginPath();
    ctx.moveTo(0,-22);
    ctx.lineTo(-18,18);
    ctx.lineTo(-8,10);
    ctx.lineTo(0,18);
    ctx.lineTo(8,10);
    ctx.lineTo(18,18);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle="#8ff";
    ctx.fillRect(-5,-10,10,16);

    ctx.restore();

    // BLASTS
    ctx.fillStyle="#ffe800";
    ctx.shadowColor="yellow";
    ctx.shadowBlur=18;

    bullets.forEach(b=>{
        ctx.fillRect(
            b.x-b.w/2,
            b.y-b.h,
            b.w,
            b.h
        );
    });

    ctx.shadowBlur=0;

    // ENEMIES
    enemies.forEach(e=>{

        ctx.save();
        ctx.translate(e.x+e.w/2,e.y+e.h/2);

        ctx.fillStyle=e.color;

        ctx.beginPath();
        ctx.ellipse(0,0,e.w/2,e.h/3,0,0,Math.PI*2);
        ctx.fill();

        ctx.fillRect(-e.w*.35,-5,e.w*.7,10);

        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(-e.w*.15,0,4,0,Math.PI*2);
        ctx.arc(e.w*.15,0,4,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    });

    // BOSS
    if(boss){

        ctx.fillStyle="#6622cc";
        ctx.fillRect(boss.x,boss.y,boss.w,boss.h);

        ctx.fillStyle="#bb55ff";
        ctx.fillRect(
            boss.x+20,
            boss.y+15,
            boss.w-40,
            boss.h-30
        );

        ctx.fillStyle="red";
        ctx.fillRect(
            boss.x,
            boss.y-20,
            boss.w,
            12
        );

        ctx.fillStyle="lime";
        ctx.fillRect(
            boss.x,
            boss.y-20,
            boss.w*(boss.hp/boss.maxHp),
            12
        );

        ctx.fillStyle="white";
        ctx.font="20px Arial";
        ctx.fillText("BOSS",boss.x+boss.w/2-25,boss.y-28);
    }

}

function loop(){

    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
